# security-workflows/.github/workflows/security-scan.yml
#
# Centralized reusable security pipeline.
# Called via workflow_call from any repo in the org.
# All jobs run in parallel; a final gate aggregates pass/fail.

name: Security Pipeline

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version for dependency scanning"
        required: false
        type: string
        default: "3.12"
      requirements-file:
        description: "Path to requirements.txt"
        required: false
        type: string
        default: "requirements.txt"
      semgrep-rules:
        description: "Semgrep rulesets (space-separated)"
        required: false
        type: string
        default: "p/python p/security-audit p/owasp-top-ten"
      severity-threshold:
        description: "Minimum severity to fail on (CRITICAL, HIGH, MEDIUM, LOW)"
        required: false
        type: string
        default: "CRITICAL"
      scan-path:
        description: "Path to scan (defaults to repo root)"
        required: false
        type: string
        default: "."
    secrets:
      SEMGREP_APP_TOKEN:
        required: false
      SOCKET_SECURITY_API_KEY:
        required: false

permissions:
  contents: read
  security-events: write
  actions: read

jobs:

  # ──────────────────────────────────────────────
  # SECRETS SCANNING
  # Searches git history and current tree for
  # leaked credentials (API keys, tokens, passwords).
  # Two tools for coverage: Gitleaks is fast and
  # regex-based; TruffleHog verifies secrets are
  # actually live, reducing false positives.
  # ──────────────────────────────────────────────

  gitleaks:
    name: "Secrets: Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e92cab31febb7310ec52e3722e0be552c # v2.3.8
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_CONFIG: .gitleaks.toml

  trufflehog:
    name: "Secrets: TruffleHog"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      # TruffleHog's --only-verified flag means it actually
      # tests whether a discovered credential is live (e.g.,
      # tries to authenticate with an AWS key). This eliminates
      # most false positives but requires network access.
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@586f66d7886cd0b037c7c245d4a6e34ef357ab10 # v3.88+
        with:
          extra_args: --only-verified --results=verified

  # ──────────────────────────────────────────────
  # STATIC APPLICATION SECURITY TESTING (SAST)
  # Analyzes source code without running it.
  # Semgrep matches AST patterns — it understands
  # code structure, not just text, so it catches
  # things grep can't (e.g., tainted data flowing
  # into a SQL query across function boundaries).
  # ──────────────────────────────────────────────

  semgrep:
    name: "SAST: Semgrep"
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config ${{ inputs.semgrep-rules }} \
            --config .semgrep/ \
            --sarif \
            --output semgrep-results.sarif \
            --error \
            ${{ inputs.scan-path }}
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # SARIF (Static Analysis Results Interchange Format)
      # is a standard JSON format. Uploading it here makes
      # findings appear in the repo's Security > Code scanning tab,
      # with inline PR annotations on the affected lines.
      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@4dd16135b69a43b6c8efb853346f8437d92d3c93 # v3.26.6
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  # ──────────────────────────────────────────────
  # DEPENDENCY / SUPPLY CHAIN SCANNING
  # Your code is ~10% of what ships — the rest is
  # dependencies. These tools check for known CVEs
  # in your packages and detect supply-chain attacks
  # (typosquatting, maintainer takeovers, etc.).
  # ──────────────────────────────────────────────

  pip-audit:
    name: "Deps: pip-audit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Cache pip
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles(inputs.requirements-file) }}
          restore-keys: ${{ runner.os }}-pip-

      # pip-audit queries the OSV (Open Source Vulnerabilities)
      # database. It resolves your requirements.txt, builds
      # a dependency tree, and checks every package+version
      # against known CVE records.
      - name: Install dependencies
        run: pip install -r ${{ inputs.requirements-file }}

      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit \
            --requirement ${{ inputs.requirements-file }} \
            --format json \
            --output pip-audit-results.json \
            --desc
        continue-on-error: false

      - name: Upload pip-audit results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pip-audit-results
          path: pip-audit-results.json

  trivy:
    name: "Deps: Trivy"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Trivy scans the filesystem for package manifests
      # (requirements.txt, Pipfile.lock, poetry.lock, etc.)
      # and checks each dependency against its own vuln DB.
      # --severity CRITICAL,HIGH filters out noise so the
      # pipeline only fails on things that genuinely need
      # immediate patching.
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6366cf37 # v0.29.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.scan-path }}
          severity: "CRITICAL,HIGH"
          format: sarif
          output: trivy-results.sarif
          exit-code: 1

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@4dd16135b69a43b6c8efb853346f8437d92d3c93 # v3.26.6
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  socket:
    name: "Supply Chain: Socket.dev"
    runs-on: ubuntu-latest
    if: ${{ secrets.SOCKET_SECURITY_API_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Socket.dev goes beyond CVE databases. It analyzes
      # package behavior: does this package read env vars?
      # Does it make network calls at install time? Does it
      # use eval()? This catches supply-chain attacks that
      # don't have a CVE yet — typosquatting, maintainer
      # account compromises, and install-time malware.
      - name: Run Socket Security
        uses: SocketDev/socket-security-action@main
        with:
          api_key: ${{ secrets.SOCKET_SECURITY_API_KEY }}

  # ──────────────────────────────────────────────
  # SOFTWARE BILL OF MATERIALS (SBOM)
  # An SBOM is a machine-readable inventory of
  # every component in your software. Required by
  # Executive Order 14028 for government contracts,
  # increasingly required by enterprise customers.
  # Syft generates it; Grype scans it for CVEs.
  # ──────────────────────────────────────────────

  sbom:
    name: "SBOM: Generate & Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Cache pip
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles(inputs.requirements-file) }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r ${{ inputs.requirements-file }}

      # Syft (by Anchore) crawls installed packages, source
      # files, and container layers to produce a complete
      # inventory. SPDX-JSON is the most widely accepted
      # SBOM format for compliance/legal review.
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532 # v0.18.0
        with:
          path: ${{ inputs.scan-path }}
          format: spdx-json
          output-file: sbom.spdx.json

      # Grype (also Anchore) takes an SBOM as input and
      # checks every listed component against the NVD and
      # GitHub Advisory Database for known CVEs. This is
      # separate from Trivy intentionally — defense in depth
      # means no single tool's blind spot leaves you exposed.
      - name: Scan SBOM with Grype
        uses: anchore/scan-action@2c901ab7378897c01b8efaa2d0c9bf519cc64b9e # v5.4.0
        with:
          sbom: sbom.spdx.json
          severity-cutoff: ${{ inputs.severity-threshold }}
          fail-build: true
          output-format: sarif

      - name: Upload Grype SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@4dd16135b69a43b6c8efb853346f8437d92d3c93 # v3.26.6
        with:
          sarif_file: results.sarif
          category: grype

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-spdx
          path: sbom.spdx.json
          retention-days: 90

  # ──────────────────────────────────────────────
  # SECURITY GATE
  # This job runs after everything else. It uses
  # needs: [...] so GitHub won't run it until all
  # upstream jobs finish. If any job failed, this
  # job also fails — giving you a single status
  # check ("Security Gate") to require in branch
  # protection rules.
  # ──────────────────────────────────────────────

  security-gate:
    name: "Security Gate"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - gitleaks
      - trufflehog
      - semgrep
      - pip-audit
      - trivy
      - sbom
    steps:
      - name: Evaluate results
        run: |
          echo "## Security Gate Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          failed=0
          for job_result in \
            "${{ needs.gitleaks.result }}" \
            "${{ needs.trufflehog.result }}" \
            "${{ needs.semgrep.result }}" \
            "${{ needs.pip-audit.result }}" \
            "${{ needs.trivy.result }}" \
            "${{ needs.sbom.result }}"; do
            if [ "$job_result" = "failure" ]; then
              failed=1
            fi
          done

          echo "| Job | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gitleaks | ${{ needs.gitleaks.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| TruffleHog | ${{ needs.trufflehog.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Semgrep | ${{ needs.semgrep.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| pip-audit | ${{ needs.pip-audit.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trivy | ${{ needs.trivy.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SBOM/Grype | ${{ needs.sbom.result }} |" >> "$GITHUB_STEP_SUMMARY"

          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "::error::Security gate FAILED — one or more checks did not pass."
            exit 1
          fi

          echo ""
          echo "All security checks passed."
