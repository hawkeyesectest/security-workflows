name: Security Pipeline

on:
  workflow_call:
    secrets:
      SEMGREP_APP_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  gitleaks:
    name: "Secrets: Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@f586c14365d4643c6aa59d472ae6e984bf47bb34
        env:
          GITHUB_TOKEN: ${{ github.token }}

  trufflehog:
    name: "Secrets: TruffleHog"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@586f66d7886cd0b037c7c245d4a6e34ef357ab10
        with:
          extra_args: --only-verified --results=verified

  semgrep:
    name: "SAST: Semgrep"
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/python \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --sarif \
            --output semgrep-results.sarif \
            --error \
            .
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: semgrep-results
          path: semgrep-results.sarif

  pip-audit:
    name: "Deps: pip-audit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install and audit
        run: |
          pip install -r requirements.txt
          pip install pip-audit
          pip-audit --requirement requirements.txt --format json --output pip-audit-results.json --desc
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pip-audit-results
          path: pip-audit-results.json

  trivy:
    name: "Deps: Trivy"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Run Trivy
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6366cf37
        with:
          scan-type: fs
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: trivy-results
          path: trivy-results.sarif

  sbom:
    name: "SBOM: Generate & Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate SBOM
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532
        with:
          path: "."
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Scan SBOM
        uses: anchore/scan-action@2c901ab7378897c01b8efaa2d0c9bf519cc64b9e
        with:
          sbom: sbom.spdx.json
          severity-cutoff: critical
          fail-build: "true"
          output-format: sarif
      - name: Upload Grype results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: grype-results
          path: results.sarif
      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom-spdx
          path: sbom.spdx.json
          retention-days: 90

  security-gate:
    name: "Security Gate"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - gitleaks
      - trufflehog
      - semgrep
      - pip-audit
      - trivy
      - sbom
    steps:
      - name: Evaluate results
        run: |
          echo "## Security Gate Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gitleaks | ${{ needs.gitleaks.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| TruffleHog | ${{ needs.trufflehog.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Semgrep | ${{ needs.semgrep.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| pip-audit | ${{ needs.pip-audit.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trivy | ${{ needs.trivy.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SBOM/Grype | ${{ needs.sbom.result }} |" >> "$GITHUB_STEP_SUMMARY"

          failed=0
          for result in \
            "${{ needs.gitleaks.result }}" \
            "${{ needs.trufflehog.result }}" \
            "${{ needs.semgrep.result }}" \
            "${{ needs.pip-audit.result }}" \
            "${{ needs.trivy.result }}" \
            "${{ needs.sbom.result }}"; do
            if [ "$result" = "failure" ]; then
              failed=1
            fi
          done

          if [ "$failed" -eq 1 ]; then
            echo "::error::Security gate FAILED — one or more checks did not pass."
            exit 1
          fi
          echo "All security checks passed."
