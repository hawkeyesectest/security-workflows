name: Security Pipeline

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version for dependency scanning"
        required: false
        type: string
        default: "3.12"
      requirements-file:
        description: "Path to requirements.txt"
        required: false
        type: string
        default: "requirements.txt"
      semgrep-rules:
        description: "Semgrep rulesets (space-separated)"
        required: false
        type: string
        default: "p/python p/security-audit p/owasp-top-ten"
      severity-threshold:
        description: "Minimum severity to fail on (CRITICAL, HIGH, MEDIUM, LOW)"
        required: false
        type: string
        default: "CRITICAL"
      scan-path:
        description: "Path to scan (defaults to repo root)"
        required: false
        type: string
        default: "."
    secrets:
      SEMGREP_APP_TOKEN:
        required: false

permissions:
  contents: read
  actions: read

jobs:
  gitleaks:
    name: "Secrets: Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e92cab31febb7310ec52e3722e0be552c # v2.3.8
        env:
          GITHUB_TOKEN: ${{ github.token }}

  trufflehog:
    name: "Secrets: TruffleHog"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@00155c9dc586f34d189adc83d3ac2698c2ec551f
        with:
          extra_args: --only-verified --results=verified

  semgrep:
    name: "SAST: Semgrep"
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run Semgrep
        run: |
          semgrep scan \
            --config ${{ inputs.semgrep-rules }} \
            --config .semgrep/ \
            --sarif \
            --output semgrep-results.sarif \
            --error \
            ${{ inputs.scan-path }}
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      - name: Upload Semgrep results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: semgrep-results
          path: semgrep-results.sarif

  security-gate:
    name: "Security Gate"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - gitleaks
      - trufflehog
      - semgrep
    steps:
      - name: Evaluate results
        run: |
          echo "## Security Gate Results"
          failed=0
          for result in "${{ needs.gitleaks.result }}" "${{ needs.trufflehog.result }}" "${{ needs.semgrep.result }}"; do
            if [ "$result" = "failure" ]; then
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "::error::Security gate FAILED"
            exit 1
          fi
          echo "All security checks passed."
