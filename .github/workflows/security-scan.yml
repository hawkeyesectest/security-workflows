name: Security Pipeline

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version for dependency scanning"
        required: false
        type: string
        default: "3.12"
      severity-threshold:
        description: "Minimum severity to fail on (CRITICAL, HIGH, MEDIUM, LOW)"
        required: false
        type: string
        default: "critical"
    secrets:
      SEMGREP_APP_TOKEN:
        required: false

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:

  gitleaks:
    name: "Secrets: Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Checkout org configs
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: hawkeyesectest/security-workflows
          path: _org-configs
          sparse-checkout: .gitleaks.toml
      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.22.1/gitleaks_8.22.1_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/
      - name: Run Gitleaks
        run: gitleaks detect --source . --verbose --config _org-configs/.gitleaks.toml

  trufflehog:
    name: "Secrets: TruffleHog"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@586f66d7886cd0b037c7c245d4a6e34ef357ab10
        with:
          extra_args: --only-verified --results=verified

  semgrep:
    name: "SAST: Semgrep"
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Checkout org configs
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: hawkeyesectest/security-workflows
          path: _org-configs
          sparse-checkout: .semgrep/
      - name: Run Semgrep
        id: semgrep-scan
        continue-on-error: true
        run: |
          CONFIGS="--config p/python --config p/security-audit --config p/owasp-top-ten"
          if [ -d "_org-configs/.semgrep" ]; then
            CONFIGS="$CONFIGS --config _org-configs/.semgrep/"
          fi
          if [ -d ".semgrep" ]; then
            CONFIGS="$CONFIGS --config .semgrep/"
          fi
          semgrep scan $CONFIGS --sarif --output semgrep-results.sarif --error .
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      - name: Upload results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: semgrep-results
          path: semgrep-results.sarif
          if-no-files-found: ignore
      - name: Fail on findings
        if: steps.semgrep-scan.outcome == 'failure'
        run: exit 1

  pip-audit:
    name: "Deps: pip-audit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install and audit
        id: pip-audit-scan
        continue-on-error: true
        run: |
          pip install -r requirements.txt
          pip install pip-audit
          pip-audit --requirement requirements.txt --format json --output pip-audit-results.json --desc
      - name: Upload results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pip-audit-results
          path: pip-audit-results.json
          if-no-files-found: ignore
      - name: Fail on findings
        if: steps.pip-audit-scan.outcome == 'failure'
        run: exit 1

  trivy:
    name: "Deps: Trivy"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Run Trivy
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6366cf37
        with:
          scan-type: fs
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
      - name: Upload results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: trivy-results
          path: trivy-results.sarif
          if-no-files-found: ignore
      - name: Fail on findings
        if: steps.trivy.outcome == 'failure'
        run: exit 1

  sbom:
    name: "SBOM: Generate & Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate SBOM
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532
        with:
          path: "."
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Scan SBOM
        uses: anchore/scan-action@2c901ab7378897c01b8efaa2d0c9bf519cc64b9e
        with:
          sbom: sbom.spdx.json
          severity-cutoff: ${{ inputs.severity-threshold }}
          fail-build: "true"
          output-format: sarif
      - name: Upload Grype results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: grype-results
          path: results.sarif
      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom-spdx
          path: sbom.spdx.json
          retention-days: 90

  security-gate:
    name: "Security Gate"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - gitleaks
      - trufflehog
      - semgrep
      - pip-audit
      - trivy
      - sbom
    steps:
      - name: Evaluate results
        id: gate
        run: |
          failed=0
          summary=""
          for pair in \
            "Gitleaks:${{ needs.gitleaks.result }}" \
            "TruffleHog:${{ needs.trufflehog.result }}" \
            "Semgrep:${{ needs.semgrep.result }}" \
            "pip-audit:${{ needs.pip-audit.result }}" \
            "Trivy:${{ needs.trivy.result }}" \
            "SBOM/Grype:${{ needs.sbom.result }}"; do
            name="${pair%%:*}"
            result="${pair##*:}"
            icon="✅"
            if [ "$result" = "failure" ]; then
              icon="❌"
              failed=1
            elif [ "$result" = "skipped" ]; then
              icon="⏭️"
            fi
            summary="$summary| $icon $name | $result |\n"
          done

          {
            echo "## 🔒 Security Gate Results"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo -e "$summary"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "failed=$failed" >> "$GITHUB_OUTPUT"

          if [ "$failed" -eq 1 ]; then
            echo "::error::Security gate FAILED — one or more checks did not pass."
            exit 1
          fi
          echo "All security checks passed."

  # ── Summary Comment: parse scan artifacts and post a PR comment ──
  summary-comment:
    name: "Summary: PR Comment"
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    needs:
      - gitleaks
      - trufflehog
      - semgrep
      - pip-audit
      - trivy
      - sbom
      - security-gate
    steps:
      - name: Download all scan artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: scan-results
        continue-on-error: true

      - name: Debug artifact structure
        if: always()
        run: find scan-results -type f 2>/dev/null || echo "No scan-results directory"

      - name: Build and post summary comment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            function readJSON(filePath) {
              try { return JSON.parse(fs.readFileSync(filePath, 'utf8')); }
              catch { return null; }
            }

            function findFile(dir, name) {
              try {
                const entries = fs.readdirSync(dir, { withFileTypes: true, recursive: true });
                for (const e of entries) {
                  if (e.name === name) {
                    const parent = e.parentPath || e.path || dir;
                    return path.join(parent, e.name);
                  }
                }
              } catch {}
              return null;
            }

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // ── Job results ──
            const jobs = [
              { name: 'Gitleaks',   cat: 'Secrets',      result: '${{ needs.gitleaks.result }}' },
              { name: 'TruffleHog', cat: 'Secrets',      result: '${{ needs.trufflehog.result }}' },
              { name: 'Semgrep',    cat: 'Code (SAST)',   result: '${{ needs.semgrep.result }}' },
              { name: 'pip-audit',  cat: 'Dependencies', result: '${{ needs.pip-audit.result }}' },
              { name: 'Trivy',      cat: 'Dependencies', result: '${{ needs.trivy.result }}' },
              { name: 'SBOM/Grype', cat: 'SBOM',         result: '${{ needs.sbom.result }}' },
            ];
            const failCount = jobs.filter(j => j.result === 'failure').length;
            const passCount = jobs.filter(j => j.result === 'success').length;
            const skipCount = jobs.filter(j => j.result === 'skipped').length;

            // ── Mitigation knowledge base (keyed by partial rule ID match) ──
            const KB = {
              'disabled-cert-validation': {
                risk: 'CRITICAL', title: 'TLS certificate verification disabled',
                why: 'Enables man-in-the-middle attacks — any network attacker can intercept and modify all traffic from this call.',
                fix: 'Remove `verify=False`. For custom CAs: `requests.get(url, verify="/path/to/ca-bundle.crt")` or set `REQUESTS_CA_BUNDLE` env var.',
              },
              'md5-used-as-password': {
                risk: 'CRITICAL', title: 'MD5 used for password hashing',
                why: 'MD5 passwords are crackable in seconds via rainbow tables. No salt, no key stretching — this is equivalent to storing plaintext.',
                fix: '```python\n# Replace hashlib.md5\nfrom passlib.hash import bcrypt\nhashed = bcrypt.hash(password)\n# or\nfrom argon2 import PasswordHasher\nhashed = PasswordHasher().hash(password)\n```',
              },
              'insecure-hash-algorithm': {
                risk: 'HIGH', title: 'Weak hash algorithm (MD5/SHA1)',
                why: 'MD5 and SHA1 have known collision attacks. They must not be used for security-sensitive operations.',
                fix: 'Use `hashlib.sha256()` for integrity checks. For passwords, use `bcrypt` or `argon2`.',
              },
              'sql-injection': {
                risk: 'CRITICAL', title: 'SQL injection via string formatting',
                why: 'User input is concatenated directly into SQL — an attacker can read, modify, or delete your entire database.',
                fix: '```python\n# BEFORE (vulnerable)\ncursor.execute(f"SELECT * FROM users WHERE id = \'{user_id}\'")\n\n# AFTER (safe)\ncursor.execute("SELECT * FROM users WHERE id = %s", (user_id,))\n```',
              },
              'jwt-decode-missing': {
                risk: 'HIGH', title: 'JWT decoded without full validation',
                why: 'Without `audience` and `issuer` checks, tokens minted for other services are accepted — breaks tenant isolation.',
                fix: '```python\njwt.decode(\n    token, key, algorithms=["RS256"],\n    audience="your-api-id",\n    issuer="https://your-auth-provider"\n)\n```',
              },
              'sensitive-data-in-log': {
                risk: 'HIGH', title: 'Credentials written to application logs',
                why: 'Secrets in logs are visible to anyone with log access and persist in log aggregation systems indefinitely.',
                fix: 'Log an event name or request ID instead of the credential value: `logging.info("auth_attempt user=%s", user_id)`',
              },
              'hardcoded': {
                risk: 'HIGH', title: 'Hardcoded secret or credential',
                why: 'Secrets in source code are visible to anyone with repo access and are captured permanently in git history.',
                fix: 'Move the value to an environment variable or secrets manager. Rotate the exposed credential immediately.',
              },
              'path-traversal': {
                risk: 'HIGH', title: 'Path traversal vulnerability',
                why: 'User-controlled file paths can escape the intended directory, reading or writing arbitrary files on the server.',
                fix: 'Use `os.path.realpath()` and verify the resolved path starts with your allowed base directory.',
              },
            };

            function matchKB(ruleId) {
              if (!ruleId) return null;
              const lower = ruleId.toLowerCase();
              for (const [key, val] of Object.entries(KB)) {
                if (lower.includes(key)) return val;
              }
              return null;
            }

            const riskOrder = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3, INFO: 4 };
            const riskIcon  = { CRITICAL: '🔴', HIGH: '🟠', MEDIUM: '🟡', LOW: '🔵', INFO: 'ℹ️' };

            // ── Parse scan results ──
            const findings = [];

            // Semgrep SARIF
            const semgrepFile = findFile('scan-results', 'semgrep-results.sarif');
            if (semgrepFile) {
              const sarif = readJSON(semgrepFile);
              for (const run of (sarif?.runs || [])) {
                const ruleMap = {};
                for (const rd of (run.tool?.driver?.rules || [])) {
                  ruleMap[rd.id] = rd;
                }
                for (const r of (run.results || [])) {
                  const loc = r.locations?.[0]?.physicalLocation;
                  const file = loc?.artifactLocation?.uri || 'unknown';
                  const line = loc?.region?.startLine || '?';
                  const ruleId = r.ruleId || '';
                  const ruleDef = ruleMap[ruleId];
                  const msg = (r.message?.text || '').split('\n')[0].substring(0, 300);
                  const kb = matchKB(ruleId);

                  const sarifLevel = r.level || ruleDef?.defaultConfiguration?.level || 'warning';
                  let risk = kb?.risk || ({ error: 'HIGH', warning: 'MEDIUM', note: 'LOW' }[sarifLevel] || 'MEDIUM');

                  findings.push({
                    source: 'Semgrep', risk, location: `\`${file}:${line}\``,
                    ruleId: ruleId.split('.').pop(),
                    ruleUrl: ruleDef?.helpUri || `https://semgrep.dev/r/${ruleId}`,
                    title: kb?.title || ruleDef?.shortDescription?.text || ruleId.split('.').pop(),
                    description: msg,
                    why: kb?.why || ruleDef?.fullDescription?.text?.substring(0, 300) || msg,
                    fix: kb?.fix || ruleDef?.help?.text?.substring(0, 300) || 'See the [Semgrep rule docs](' + (ruleDef?.helpUri || `https://semgrep.dev/r/${ruleId}`) + ') for the recommended fix.',
                  });
                }
              }
              core.info(`Parsed ${findings.length} Semgrep findings from ${semgrepFile}`);
            } else {
              core.info('No Semgrep SARIF found');
            }

            // pip-audit JSON
            const pipFile = findFile('scan-results', 'pip-audit-results.json');
            if (pipFile) {
              const data = readJSON(pipFile);
              let pipCount = 0;
              for (const dep of (data?.dependencies || [])) {
                for (const v of (dep.vulns || [])) {
                  pipCount++;
                  const cveId = v.aliases?.find(a => a.startsWith('CVE-')) || '';
                  const ghsaId = v.aliases?.find(a => a.startsWith('GHSA-')) || '';
                  const desc = v.description || 'Known vulnerability in this package version.';
                  const hasFix = v.fix_versions?.length > 0;
                  const latestFix = hasFix ? v.fix_versions[v.fix_versions.length - 1] : null;

                  const links = [];
                  if (cveId) links.push(`[${cveId}](https://nvd.nist.gov/vuln/detail/${cveId})`);
                  if (ghsaId) links.push(`[${ghsaId}](https://github.com/advisories/${ghsaId})`);
                  if (v.id?.startsWith('PYSEC-')) links.push(`[${v.id}](https://osv.dev/vulnerability/${v.id})`);

                  findings.push({
                    source: 'pip-audit',
                    risk: desc.toLowerCase().includes('remote code') || desc.toLowerCase().includes('critical') ? 'CRITICAL' : 'HIGH',
                    location: `\`requirements.txt\` — \`${dep.name}==${dep.version}\``,
                    ruleId: v.id,
                    ruleUrl: cveId ? `https://nvd.nist.gov/vuln/detail/${cveId}` : `https://osv.dev/vulnerability/${v.id}`,
                    title: `${dep.name} ${dep.version} — ${cveId || v.id}`,
                    description: desc.substring(0, 300),
                    why: desc.substring(0, 300),
                    fix: hasFix
                      ? `**Upgrade to ${dep.name}>=${latestFix}:**\n\`\`\`bash\npip install "${dep.name}>=${latestFix}" && pip freeze | grep -i ${dep.name}\n\`\`\`\nThen update \`requirements.txt\` with the new version.`
                      : `**No patched version available.** ${links.length ? 'Review the advisory (' + links[0] + ') for workarounds.' : ''} Options:\n- If the vulnerable code path is not reachable, add to your risk acceptance log with justification.\n- Consider replacing \`${dep.name}\` with an alternative package.\n- Pin and monitor for a future fix.`,
                    links,
                  });
                }
              }
              core.info(`Parsed ${pipCount} pip-audit findings from ${pipFile}`);
            }

            // Trivy SARIF
            const trivyFile = findFile('scan-results', 'trivy-results.sarif');
            if (trivyFile) {
              const sarif = readJSON(trivyFile);
              let trivyCount = 0;
              for (const run of (sarif?.runs || [])) {
                const ruleMap = {};
                for (const rd of (run.tool?.driver?.rules || [])) {
                  ruleMap[rd.id] = rd;
                }
                for (const r of (run.results || [])) {
                  trivyCount++;
                  const ruleId = r.ruleId || 'unknown';
                  const ruleDef = ruleMap[ruleId];
                  const msg = (r.message?.text || '').split('\n')[0].substring(0, 300);
                  const sarifLevel = r.level || 'warning';

                  const cveMatch = ruleId.match(/CVE-\d+-\d+/);
                  const cveId = cveMatch ? cveMatch[0] : '';
                  const helpUrl = ruleDef?.helpUri || (cveId ? `https://nvd.nist.gov/vuln/detail/${cveId}` : '');

                  const pkgMatch = msg.match(/Package:\s*(\S+)/i) || msg.match(/^(\S+)/);
                  const verMatch = msg.match(/Installed Version:\s*(\S+)/i);
                  const fixMatch = msg.match(/Fixed Version:\s*(\S+)/i);
                  const pkg = pkgMatch?.[1] || '';
                  const fixVer = fixMatch?.[1] || '';

                  findings.push({
                    source: 'Trivy',
                    risk: sarifLevel === 'error' ? 'CRITICAL' : 'HIGH',
                    location: `\`requirements.txt\` — \`${pkg}${verMatch ? '==' + verMatch[1] : ''}\``,
                    ruleId: cveId || ruleId,
                    ruleUrl: helpUrl,
                    title: `${pkg || ruleId} — ${cveId || ruleId}`,
                    description: msg,
                    why: ruleDef?.fullDescription?.text?.substring(0, 300) || msg,
                    fix: fixVer
                      ? `**Upgrade to ${pkg}>=${fixVer}:**\n\`\`\`bash\npip install "${pkg}>=${fixVer}" && pip freeze | grep -i ${pkg}\n\`\`\`\nThen update \`requirements.txt\`.`
                      : `Review the [advisory](${helpUrl}) for mitigation. ${cveId ? `[View on NVD](https://nvd.nist.gov/vuln/detail/${cveId})` : ''}`,
                    links: cveId ? [`[${cveId}](https://nvd.nist.gov/vuln/detail/${cveId})`] : [],
                  });
                }
              }
              core.info(`Parsed ${trivyCount} Trivy findings from ${trivyFile}`);
            }

            // Deduplicate across scanners (same CVE from pip-audit + Trivy)
            const seen = new Set();
            const deduped = [];
            for (const f of findings) {
              const key = `${f.ruleId}::${f.source}`;
              if (!seen.has(key)) {
                seen.add(key);
                deduped.push(f);
              }
            }
            deduped.sort((a, b) => (riskOrder[a.risk] ?? 99) - (riskOrder[b.risk] ?? 99));

            // ── Build comment ──
            const L = [];

            if (failCount === 0) {
              L.push(`## ✅ Security Pipeline — All Checks Passed`);
              L.push(``);
              L.push(`All **${passCount}** security checks passed. No action required.`);
            } else {
              L.push(`## 🚨 Security Pipeline — ${failCount} Check${failCount > 1 ? 's' : ''} Failed`);
              L.push(``);
              L.push(`> **This PR cannot be merged** until the findings below are resolved or [explicitly suppressed](https://github.com/hawkeyesectest/security-workflows#suppressing-false-positives).`);
            }
            L.push(``);

            // Quick-fix commands (if any dependency findings have fixes)
            const depFixes = deduped.filter(f =>
              (f.source === 'pip-audit' || f.source === 'Trivy') && f.fix?.includes('pip install')
            );
            if (depFixes.length > 0) {
              L.push(`### ⚡ Quick Fix`);
              L.push(``);
              L.push(`Run this to resolve dependency vulnerabilities:`);
              L.push(``);
              L.push('```bash');
              const fixCmds = new Set();
              for (const f of depFixes) {
                const m = f.fix.match(/pip install "([^"]+)"/);
                if (m) fixCmds.add(`pip install "${m[1]}"`);
              }
              for (const cmd of fixCmds) L.push(cmd);
              L.push(`pip freeze > requirements.txt`);
              L.push('```');
              L.push(``);
            }

            // Status table
            L.push(`### Scanner Results`);
            L.push(``);
            L.push(`| Check | Category | Status | |`);
            L.push(`|:------|:---------|:------:|:-|`);
            for (const j of jobs) {
              let icon, note;
              if (j.result === 'success') { icon = '✅'; note = ''; }
              else if (j.result === 'failure') { icon = '❌'; note = `[View logs](${runUrl})`; }
              else { icon = '⏭️'; note = 'Upstream dependency skipped'; }
              L.push(`| **${j.name}** | ${j.cat} | ${icon} | ${note} |`);
            }
            L.push(``);

            if (skipCount > 0) {
              L.push(`> **Why were checks skipped?** A skipped check means one of its dependencies failed first. Fix the failed checks and the skipped ones will run on the next push.`);
              L.push(``);
            }

            // Findings
            if (deduped.length === 0 && failCount > 0) {
              L.push(`> ⚠️ Scanners reported failures but no parseable result artifacts were found. [Check the workflow logs](${runUrl}) for details.`);
            }

            if (deduped.length > 0) {
              L.push(`---`);
              L.push(``);
              L.push(`### 🔍 Findings (${deduped.length} total — sorted by risk)`);
              L.push(``);

              const grouped = {};
              for (const f of deduped) {
                if (!grouped[f.risk]) grouped[f.risk] = [];
                grouped[f.risk].push(f);
              }

              let n = 0;
              for (const risk of ['CRITICAL', 'HIGH', 'MEDIUM', 'LOW']) {
                const items = grouped[risk];
                if (!items?.length) continue;

                const icon = riskIcon[risk];
                const open = risk === 'CRITICAL' || risk === 'HIGH' ? ' open' : '';
                L.push(`<details${open}>`);
                L.push(`<summary>${icon} <strong>${risk}</strong> — ${items.length} finding${items.length > 1 ? 's' : ''}</summary>`);
                L.push(``);

                for (const f of items) {
                  n++;
                  L.push(`---`);
                  L.push(``);
                  L.push(`#### ${n}. ${f.title}`);
                  L.push(``);

                  // Metadata row
                  const refs = [];
                  if (f.ruleUrl) refs.push(`[Rule docs](${f.ruleUrl})`);
                  if (f.links?.length) refs.push(...f.links);

                  L.push(`> **${f.source}** · ${f.location}${refs.length ? ' · ' + refs.join(' · ') : ''}`);
                  L.push(``);

                  // What & Why
                  if (f.description && f.description !== f.why) {
                    L.push(`**What was found:** ${f.description}`);
                    L.push(``);
                  }
                  L.push(`**Why this matters:** ${f.why}`);
                  L.push(``);

                  // Fix
                  L.push(`<details>`);
                  L.push(`<summary>🔧 <strong>How to fix</strong></summary>`);
                  L.push(``);
                  L.push(f.fix);
                  L.push(``);
                  L.push(`</details>`);
                  L.push(``);
                }

                L.push(`</details>`);
                L.push(``);
              }
            }

            // Footer
            L.push(`---`);
            L.push(``);
            L.push(`<details>`);
            L.push(`<summary>ℹ️ About this comment</summary>`);
            L.push(``);
            L.push(`Auto-generated by the [centralized security pipeline](https://github.com/hawkeyesectest/security-workflows). Updates on each push.`);
            L.push(``);
            L.push(`- **False positive?** Add a \`# nosec\` / \`# nosemgrep\` inline comment with justification`);
            L.push(`- **Risk accepted?** Document in your repo's \`SECURITY.md\` and add to the suppression config`);
            L.push(`- **Need help?** Tag \`@security-team\` on this PR`);
            L.push(``);
            L.push(`</details>`);

            const body = L.join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '<!-- security-pipeline-summary -->';
            const existing = comments.find(c =>
              c.user?.login === 'github-actions[bot]' &&
              (c.body?.includes(marker) || c.body?.includes('Security Pipeline'))
            );

            const fullBody = marker + '\n' + body;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
              core.info(`Updated comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
              core.info('Created new comment');
            }
