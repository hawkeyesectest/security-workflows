name: Code Security (Secrets + SAST)

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version for scanning context"
        required: false
        type: string
        default: "3.12"
    secrets:
      SEMGREP_APP_TOKEN:
        required: false

permissions:
  contents: read

jobs:

  gitleaks:
    name: "Secrets: Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Checkout org configs
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          repository: hawkeyesectest/security-workflows
          path: _org-configs
          sparse-checkout: .gitleaks.toml
      - name: Install Gitleaks
        run: |
          EXPECTED_SHA="2f92ab3b8e08319ac30836c32b90818e01519c3a4982771e4f45a7f5607872f7"
          curl -sSfL -o gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.22.1/gitleaks_8.22.1_linux_x64.tar.gz
          echo "${EXPECTED_SHA}  gitleaks.tar.gz" | sha256sum -c -
          tar xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/
          rm gitleaks.tar.gz
      - name: Run Gitleaks
        run: gitleaks detect --source . --verbose --config _org-configs/.gitleaks.toml

  trufflehog:
    name: "Secrets: TruffleHog"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55
        with:
          extra_args: --only-verified --results=verified

  semgrep:
    name: "SAST: Semgrep"
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Checkout org configs
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          repository: hawkeyesectest/security-workflows
          path: _org-configs
          sparse-checkout: .semgrep/
      - name: Run Semgrep
        id: semgrep-scan
        continue-on-error: true
        run: |
          CONFIGS="--config p/python --config p/security-audit --config p/owasp-top-ten"
          if [ -d "_org-configs/.semgrep" ]; then
            CONFIGS="$CONFIGS --config _org-configs/.semgrep/"
          fi
          if [ -d ".semgrep" ]; then
            CONFIGS="$CONFIGS --config .semgrep/"
          fi
          semgrep scan $CONFIGS --sarif --output semgrep-results.sarif --error .
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      - name: Upload results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: semgrep-results
          path: semgrep-results.sarif
          if-no-files-found: ignore
      - name: Fail on findings
        if: steps.semgrep-scan.outcome == 'failure'
        run: exit 1

  code-security-gate:
    name: "Code Security Gate"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - gitleaks
      - trufflehog
      - semgrep
    steps:
      - name: Evaluate results
        run: |
          failed=0
          for pair in \
            "Gitleaks:${{ needs.gitleaks.result }}" \
            "TruffleHog:${{ needs.trufflehog.result }}" \
            "Semgrep:${{ needs.semgrep.result }}"; do
            name="${pair%%:*}"
            result="${pair##*:}"
            if [ "$result" = "failure" ]; then
              echo "::error::$name failed"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "::error::Code security gate FAILED."
            exit 1
          fi
          echo "All code security checks passed."
