# Centralized license policy for the organization.
# Referenced by the supply-chain workflow's license-check job.

allowed:
  - MIT
  - Apache-2.0
  - BSD-2-Clause
  - BSD-3-Clause
  - ISC
  - PSF-2.0
  - MPL-2.0
  - Unlicense
  - CC0-1.0
  - 0BSD
  - Python-2.0

denied:
  - GPL-2.0-only
  - GPL-2.0-or-later
  - GPL-3.0-only
  - GPL-3.0-or-later
  - AGPL-3.0-only
  - AGPL-3.0-or-later
  - SSPL-1.0
  - EUPL-1.1
  - EUPL-1.2
